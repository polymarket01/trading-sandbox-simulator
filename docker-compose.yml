name: spot-mm-sandbox

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sandbox
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox -d sandbox"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://sandbox:sandbox@db:5432/sandbox
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:5173"]'
    working_dir: /app
    command: ["/bin/sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 5174"]
    ports:
      - "5174:5174"

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE_URL: http://localhost:5174/api/v1
      VITE_PUBLIC_WS_URL: ws://localhost:5174/ws/public
      VITE_PRIVATE_WS_URL: ws://localhost:5174/ws/private
      VITE_MANUAL_API_KEY: manual-demo-key
      VITE_MANUAL_API_SECRET: manual-demo-secret
      VITE_ADMIN_API_KEY: admin-demo-key
    ports:
      - "5173:5173"

volumes:
  pgdata:
